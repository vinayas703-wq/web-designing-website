<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: rgba(255, 255, 255, 0.9);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            background: white;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            width: 43px;
            height: 43px;
            border-radius: 12px;
        }

        .header-text h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 700;
        }

        .header-text span {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 600;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--secondary);
            font-weight: 500;
            font-size: 15px;
        }

        .nav-menu a:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <header class="header-container">
        <div class="header-left">
            <div class="header-logo">
                <img src="images/manglorelogo.jpg" alt="logo" />
            </div>
            <div class="header-text">
                <h1>Mangaluru</h1>
                <span>The Coastal Cradle</span>
            </div>
        </div>
        <nav class="nav-menu">
            <a href="content.html#home">Home</a>
            <a href="content.html#places">Attraction</a>
            <a href="content.html#contact">Contact</a>
        </nav>
    </header>
</body>

</html>
