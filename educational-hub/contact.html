    <meta name="description" content="Get in touch with the EduHub team.">

</head>
<body>
    <header>
        <nav>
            <div class="logo">EduHub</div>
            <button class="mobile-menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <h1 style="text-align: center;">Contact Us</h1>
        <p style="text-align: center; margin-bottom: 2rem;">Have questions or suggestions? We'd love to hear from you!</p>

        <div class="glass-card" style="max-width: 700px; margin: 0 auto;">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@student.edu">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required placeholder="Question about resources">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="Type your message here..."></textarea>
                </div>
                <button type="submit" class="btn" style="align-self: flex-start;">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 EduHub. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
